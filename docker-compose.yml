services:
  app-paseadores:
    build: .
    container_name: app-paseadores
    env_file:
      - .env
    environment:
      JWT_SECRET: ${JWT_SECRET}
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    command: ./gradlew bootRun
